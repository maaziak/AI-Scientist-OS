services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-scientist-os-postgres
    environment:
      POSTGRES_DB: ai_scientist_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai-scientist-os-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-scientist-os-backend
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_OPENAI_BASE_URL: http://host.docker.internal:11434/v1
      OPENAI_BASE_URL: http://host.docker.internal:11434/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_scientist_os
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_scientist_os
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE_PATH: /app/storage
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app/backend
      - app_storage:/app/storage

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai-scientist-os-frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  postgres_data:
  app_storage:
